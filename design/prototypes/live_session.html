<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowLingo - 实时翻译</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }
        .animate-pulse-ring { animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .glass-panel { @apply bg-black/40 backdrop-blur-md border border-white/10 rounded-2xl; }
        .chat-bubble-cat { @apply bg-yellow-400 text-gray-900 rounded-tr-none; }
        .chat-bubble-human { @apply bg-white/20 text-white rounded-tl-none; }
    </style>
</head>
<body class="bg-black text-white h-screen w-screen overflow-hidden relative">

    <!-- Background Video Simulation -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1513245543132-31f507417b26?q=80&w=1935&auto=format&fit=crop" 
             class="w-full h-full object-cover opacity-80" 
             alt="Camera Feed">
        <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80"></div>
    </div>

    <!-- Top Bar -->
    <header class="absolute top-0 left-0 right-0 z-20 p-6 flex justify-between items-start">
        <!-- Status & Persona -->
        <div class="glass-panel px-4 py-2 flex items-center gap-3">
            <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
            <span class="font-mono text-sm tracking-wider text-red-400">LIVE</span>
            <div class="h-4 w-px bg-white/20"></div>
            <div class="flex items-center gap-2">
                <i class="fas fa-crown text-yellow-400"></i>
                <span class="font-bold text-sm">傲娇喵皇</span>
            </div>
        </div>

        <!-- Settings / Close -->
        <div class="flex gap-2">
            <button class="glass-panel w-10 h-10 flex items-center justify-center hover:bg-white/10 transition">
                <i class="fas fa-cog"></i>
            </button>
            <a href="landing.html" class="glass-panel w-10 h-10 flex items-center justify-center hover:bg-red-500/20 hover:text-red-400 transition">
                <i class="fas fa-times"></i>
            </a>
        </div>
    </header>

    <!-- Main Interaction Area -->
    <main class="absolute inset-0 z-10 flex flex-col justify-center items-center pointer-events-none p-4">
        
        <!-- Avatar Overlay (Right Side) -->
        <div class="absolute right-8 top-1/3 w-32 h-32 md:w-48 md:h-48 glass-panel flex items-center justify-center border-yellow-400/30 animate-float pointer-events-auto cursor-pointer hover:scale-105 transition">
            <!-- Simulated Avatar -->
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix&backgroundColor=b6e3f4" 
                 class="w-full h-full rounded-2xl p-2" alt="Avatar">
            <div class="absolute -bottom-2 -right-2 bg-yellow-400 text-black text-xs font-bold px-2 py-1 rounded-full shadow-lg">
                <i class="fas fa-volume-high"></i> 说话中...
            </div>
        </div>

        <!-- Chat / Translation Stream -->
        <div class="w-full max-w-2xl space-y-4 flex flex-col items-center justify-end h-3/4 pb-24">
            
            <!-- History Bubble -->
            <div class="flex items-end gap-2 self-start animate-fade-in opacity-50 scale-95 origin-left">
                <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center overflow-hidden border border-white/20">
                    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix" class="w-full h-full">
                </div>
                <div class="glass-panel px-4 py-2 text-sm text-gray-300">
                    愚蠢的人类，还不快把罐头呈上来？
                </div>
            </div>

            <!-- Active Translation Bubble -->
            <div class="flex items-end gap-3 self-start animate-slide-up">
                <div class="w-10 h-10 rounded-full bg-yellow-400 flex items-center justify-center overflow-hidden border-2 border-yellow-400 shadow-lg z-10">
                    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix" class="w-full h-full">
                </div>
                <div class="bg-yellow-400 text-gray-900 px-6 py-4 rounded-2xl rounded-bl-none text-lg font-bold shadow-lg relative max-w-md">
                    <i class="fas fa-quote-left text-yellow-600/30 text-2xl absolute top-2 left-2"></i>
                    <span class="relative z-10">看什么看？本喵只是在思考猫生大事，绝对不是在发呆！</span>
                </div>
            </div>

        </div>
    </main>

    <!-- Bottom Controls -->
    <footer class="absolute bottom-0 left-0 right-0 z-20 p-8 flex justify-center items-end bg-gradient-to-t from-black via-black/80 to-transparent pt-24">
        <div class="flex items-center gap-6">
            
            <!-- Tool: Play Sound -->
            <button class="glass-panel w-14 h-14 rounded-full flex flex-col items-center justify-center gap-1 hover:bg-white/10 active:scale-95 transition group tooltip" title="呼唤猫咪">
                <i class="fas fa-paw text-pink-400 group-hover:scale-110 transition"></i>
                <span class="text-[10px] font-bold text-gray-400">呼唤</span>
            </button>

            <!-- Main Mic Toggle -->
            <button class="w-20 h-20 bg-yellow-400 hover:bg-yellow-300 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(250,204,21,0.4)] hover:shadow-[0_0_50px_rgba(250,204,21,0.6)] transition transform hover:scale-105 active:scale-95 relative group">
                <div class="absolute inset-0 rounded-full border-2 border-white/30 animate-ping opacity-75"></div>
                <i class="fas fa-microphone text-3xl text-gray-900 group-hover:animate-bounce"></i>
            </button>

            <!-- Generate Report -->
            <a href="report.html" id="report-btn" class="glass-panel w-14 h-14 rounded-full flex flex-col items-center justify-center gap-1 hover:bg-white/10 active:scale-95 transition group relative">
                <i class="fas fa-file-invoice text-blue-400 group-hover:scale-110 transition"></i>
                <span class="text-[10px] font-bold text-gray-400">日报</span>
                
                <!-- Capture Counter Badge -->
                <div id="capture-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-gray-900 hidden transform transition-transform duration-200 shadow-sm z-30">0</div>
            </a>

        </div>
    </footer>

    <script>
        // --- Capture Badge Logic ---
        const badge = document.getElementById('capture-badge');
        // Find the main yellow mic button using its distinctive class
        const micBtn = document.querySelector('button.bg-yellow-400'); 
        const reportBtn = document.getElementById('report-btn');
        let captureCount = 0;

        // Function to update badge
        function updateCaptureBadge(isManual = false) {
            captureCount++;
            
            // Update number
            badge.innerText = captureCount > 99 ? '99+' : captureCount;
            
            // Show badge if hidden
            if (badge.classList.contains('hidden')) {
                badge.classList.remove('hidden');
            }

            // Pop Animation Effect
            badge.classList.remove('scale-100');
            badge.classList.add('scale-125'); 
            setTimeout(() => {
                badge.classList.remove('scale-125');
                badge.classList.add('scale-100');
            }, 200);

            // Optional: Provide visual feedback for manual capture on the target button
            if (isManual && reportBtn) {
                // Flash effect on report button to draw attention
                const originalClasses = reportBtn.className;
                reportBtn.classList.add('bg-white/30');
                setTimeout(() => reportBtn.classList.remove('bg-white/30'), 300);
            }
        }

        // 1. Simulate Auto Capture (every 8 seconds for demo)
        setInterval(() => {
            // Randomly decide if capture happens to feel more natural
            if (Math.random() > 0.2) { 
                updateCaptureBadge(false);
                console.log('Auto capture triggered. Count:', captureCount);
            }
        }, 8000);

        // 2. Manual Capture Trigger (Clicking Mic Button)
        if (micBtn) {
            micBtn.addEventListener('click', (e) => {
                updateCaptureBadge(true);
                
                // Add a ripple effect to the mic button for immediate feedback
                const ripple = document.createElement('div');
                ripple.className = 'absolute inset-0 rounded-full border-4 border-white opacity-75 animate-ping pointer-events-none';
                micBtn.appendChild(ripple);
                
                // Remove ripple after animation
                setTimeout(() => {
                    if (ripple.parentNode) ripple.parentNode.removeChild(ripple);
                }, 1000);
            });
        }
    </script>
</body>
</html>
