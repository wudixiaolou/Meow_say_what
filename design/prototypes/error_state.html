<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowLingo - 连接错误</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6 relative">

    <!-- Background (Blurred Live View) -->
    <div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1513245543132-31f507417b26?q=80&w=1935&auto=format&fit=crop')] bg-cover bg-center blur-md opacity-50"></div>
    <div class="absolute inset-0 bg-black/60 z-0"></div>

    <!-- Error Modal -->
    <div class="relative z-10 w-full max-w-md bg-gray-800 rounded-3xl p-8 shadow-2xl border border-red-500/30 text-center animate-bounce-in">
        
        <div class="w-20 h-20 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-wifi-slash text-4xl text-red-500"></i>
        </div>

        <h2 class="text-2xl font-bold mb-2">信号丢失</h2>
        <p class="text-gray-400 mb-8">
            看起来我们和喵星的通讯中断了。<br>可能是因为网络波动或设备权限被拒绝。
        </p>

        <div class="space-y-4">
            <button onclick="location.reload()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-red-500/20 flex items-center justify-center gap-2">
                <i class="fas fa-rotate-right"></i> 立即重试
            </button>
            
            <a href="landing.html" class="block w-full bg-gray-700 hover:bg-gray-600 text-gray-300 font-bold py-4 rounded-xl transition">
                返回首页
            </a>
        </div>

        <div class="mt-6 pt-6 border-t border-gray-700">
            <p class="text-xs text-gray-500">错误代码: 1006_CONNECTION_RESET</p>
        </div>
    </div>

</body>
</html>
