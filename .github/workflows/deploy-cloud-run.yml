name: deploy-cloud-run

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: Cloud Run service name
        required: false
        default: meowlingo-backend
      region:
        description: GCP region
        required: false
        default: us-central1

jobs:
  mobile-quality-gate:
    uses: ./.github/workflows/mobile-regression.yml
    secrets: inherit

  deploy:
    needs: mobile-quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ github.event.inputs.region || 'us-central1' }}
      SERVICE_NAME: ${{ github.event.inputs.service_name || 'meowlingo-backend' }}
      ALLOW_UNAUTHENTICATED: "true"
      MIN_INSTANCES: "0"
      MAX_INSTANCES: "2"
      MEMORY: "2Gi"
      CPU: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: deploy
        run: bash server/deploy_cloud_run.sh
